<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Szerver Csatlakozás</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #111e31, #0f0f0f);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 20px 30px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
      
    }

    .countdown {
      font-size: 36px;
      font-weight: 700;
      margin: 15px 0;
      color: #4da6ff;
    }

    .btn {
      margin-top: 20px;
      padding: 14px 28px;
      border-radius: 30px;
      background: linear-gradient(135deg, #4da6ff, #1f6bff);
      color: white;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.9;
    }
    footer {
      position: fixed;
      bottom: 15px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <footer>© készítette Pingu</footer>
  <div class="card">

    <h1>Csatlakozás folyamatban</h1>
    <p>A szerver hamarosan elindul…</p>

    <div class="countdown" id="countdown">5</div>

    <button class="btn" id="startBtn">indítás</button>
  </div>
  <script>
    const SERVER_URL = "mtasa://213.181.206.27:22034";
    const START_TIME = 5;

    let timeLeft = START_TIME;
    const countdownEl = document.getElementById("countdown");
    const btn = document.getElementById("startBtn");

    btn.addEventListener("click", () => {
      btn.style.display = "none";

      sound.volume = 0.5;
      sound.play().catch(() => {});

      const timer = setInterval(() => {
        timeLeft--;
        countdownEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timer);
          window.location.href = SERVER_URL;
        }
      }, 1000);
    });
  </script>

</body>
</html>
